name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present

  quality:
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    steps:
      - uses: actions/checkout@v4
      - name: Check for banned patterns
        run: |
          echo "=== Checking for TODO/FIXME/HACK ==="
          found=$(grep -rn "TODO\|FIXME\|HACK" src/ app/ --include='*.ts' --include='*.tsx' 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "::warning::Found TODO/FIXME/HACK comments:"
            echo "$found"
          fi

          echo "=== Checking for : any types ==="
          found=$(grep -rn ": any\b" src/ app/ --include='*.ts' --include='*.tsx' 2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "::warning::Found \`any\` types:"
            echo "$found"
          fi

          echo "Quality gate passed (warnings issued if any)"
